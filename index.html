<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>f(x)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.2.1/math.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   CSS VARIABLES — LIGHT & DARK THEME
   ═══════════════════════════════════════════════════════════ */
:root {
  --font-stack: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --mono-stack: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;

  /* Light theme */
  --bg-canvas: #fafafa;
  --glass-bg: rgba(255, 255, 255, 0.72);
  --glass-border: rgba(255, 255, 255, 0.55);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  --card-bg: #ffffff;
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #aeaeb2;
  --accent: #007aff;
  --accent-hover: #0063d1;
  --accent-glow: rgba(0, 122, 255, 0.15);
  --input-bg: #f2f2f7;
  --grid-minor: rgba(0, 0, 0, 0.04);
  --grid-major: rgba(99, 33, 33, 0.1);
  --axis-color: rgba(0, 0, 0, 0.3);
  --axis-label: rgba(0, 0, 0, 0.35);
  --tooltip-bg: rgba(28, 28, 30, 0.92);
  --tooltip-text: #f5f5f7;
  --danger: #ff3b30;
  --success: #34c759;
  --separator: rgba(0, 0, 0, 0.06);
  --panel-blur: 24px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --transition-fast: 0.18s cubic-bezier(0.25, 0.1, 0.25, 1);
  --transition-smooth: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
  --transition-bounce: 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
}

[data-theme="dark"] {
  --bg-canvas: #000000;
  --glass-bg: rgba(28, 28, 30, 0.72);
  --glass-border: rgba(255, 255, 255, 0.1);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  --card-bg: #1c1c1e;
  --text-primary: #f5f5f7;
  --text-secondary: #98989d;
  --text-tertiary: #636366;
  --accent-glow: rgba(0, 122, 255, 0.2);
  --input-bg: #2c2c2e;
  --grid-minor: rgba(255, 255, 255, 0.03);
  --grid-major: rgba(255, 255, 255, 0.08);
  --axis-color: rgba(255, 255, 255, 0.25);
  --axis-label: rgba(255, 255, 255, 0.35);
  --separator: rgba(255, 255, 255, 0.08);
}

/* ═══════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: var(--font-stack);
  background: var(--bg-canvas);
  color: var(--text-primary);
  transition: background var(--transition-smooth), color var(--transition-smooth);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection { background: var(--accent); color: #fff; }

/* ═══════════════════════════════════════════════════════════
   CANVAS
   ═══════════════════════════════════════════════════════════ */
#plotCanvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  cursor: crosshair;
  z-index: 0;
  touch-action: none;
}
#plotCanvas.grabbing { cursor: grabbing; }

/* ═══════════════════════════════════════════════════════════
   GLASS PANEL MIXIN
   ═══════════════════════════════════════════════════════════ */
.glass {
  background: var(--glass-bg);
  -webkit-backdrop-filter: saturate(180%) blur(var(--panel-blur));
  backdrop-filter: saturate(180%) blur(var(--panel-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--glass-shadow);
  transition: background var(--transition-smooth), border-color var(--transition-smooth), box-shadow var(--transition-smooth);
}

/* ═══════════════════════════════════════════════════════════
   CONTROL PANEL
   ═══════════════════════════════════════════════════════════ */
#controlPanel {
  position: fixed;
  top: 16px; left: 16px;
  width: 340px;
  max-height: calc(100vh - 32px);
  z-index: 100;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: slideIn 0.5s var(--transition-bounce);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-20px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--separator);
}

.panel-title {
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.4px;
  display: flex; align-items: center; gap: 8px;
}

.panel-title-icon {
  height: 28px;
  background: #ffffff;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  color: #000000; font-size: 12px; font-weight: 800;
  font-family: var(--mono-stack);
  padding: 0 6px;
}

.header-actions { display: flex; gap: 2px; }

/* Panel collapse */
#controlPanel {
  transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.35s ease;
}
#controlPanel.collapsed .panel-body,
#controlPanel.collapsed #addFnBtn,
#controlPanel.collapsed .var-section {
  display: none;
}
#controlPanel.collapsed {
  width: auto;
  max-height: none;
}
#collapseBtn {
  transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
}
#controlPanel.collapsed #collapseBtn {
  transform: rotate(180deg);
}

/* Swipe hint for touch — small pill that fades */
#panelToggleHint {
  position: fixed; top: 50%; left: 0; z-index: 101;
  width: 28px; height: 56px;
  background: var(--glass-bg);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-left: none;
  border-radius: 0 12px 12px 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 12px;
  transform: translateY(-50%);
  transition: opacity 0.3s ease, left 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
  opacity: 0; pointer-events: none;
}
#panelToggleHint.visible {
  opacity: 0.7; pointer-events: auto;
}
#panelToggleHint.visible:hover { opacity: 1; }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--text-tertiary) transparent;
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 2px; }

/* ═══════════════════════════════════════════════════════════
   FUNCTION LAYER CARD
   ═══════════════════════════════════════════════════════════ */
.layer-card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 12px;
  margin-bottom: 8px;
  border: 1px solid var(--separator);
  transition: all var(--transition-fast);
  animation: cardSlideIn 0.35s var(--transition-bounce);
}
.layer-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.layer-card.removing {
  animation: cardSlideOut 0.3s cubic-bezier(0.55, 0, 1, 0.45) forwards;
}

@keyframes cardSlideIn {
  from { opacity: 0; transform: translateX(-12px) scale(0.97); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes cardSlideOut {
  to { opacity: 0; transform: translateX(-12px) scale(0.97); max-height: 0; padding: 0; margin: 0; border-width: 0; overflow: hidden; }
}

/* Type Selector */
.type-row {
  display: flex; gap: 3px; margin-bottom: 8px;
}
.type-btn {
  flex: 1; padding: 4px 0;
  background: var(--input-bg);
  border: 1px solid transparent;
  border-radius: 6px;
  font-size: 11px; font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  letter-spacing: 0.2px;
  text-align: center;
}
.type-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.type-btn:hover:not(.active) {
  background: var(--separator);
  color: var(--text-primary);
}

/* Color Dot */
.color-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  cursor: pointer;
  border: 2px solid rgba(0,0,0,0.08);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  position: relative;
}
[data-theme="dark"] .color-dot { border-color: rgba(255,255,255,0.15); }
.color-dot:hover { transform: scale(1.2); box-shadow: 0 0 0 3px var(--accent-glow); }
.color-dot input[type="color"] {
  position: absolute; inset: -4px;
  opacity: 0; cursor: pointer;
  width: calc(100% + 8px); height: calc(100% + 8px);
}

/* Equation Input */
.eq-input {
  flex: 1;
  background: var(--input-bg);
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-family: var(--mono-stack);
  font-size: 12.5px;
  color: var(--text-primary);
  outline: none;
  transition: all var(--transition-fast);
  min-width: 0;
}
.eq-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.eq-input.error {
  border-color: var(--danger);
  box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.12);
}

/* Suggestion dropdown */
#suggestDropdown {
  position: fixed; z-index: 300;
  background: var(--card-bg);
  border: 1px solid var(--separator);
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  max-height: 300px;
  overflow-y: auto;
  display: none;
  min-width: 200px;
  scrollbar-width: thin;
}
#suggestDropdown.visible { display: block; }
#suggestDropdown::-webkit-scrollbar { width: 4px; }
#suggestDropdown::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 2px; }

.suggest-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  cursor: pointer;
  transition: background var(--transition-fast);
  border-bottom: 1px solid var(--separator);
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover, .suggest-item.active { background: var(--input-bg); }
.suggest-item .suggest-fn {
  font-family: var(--mono-stack);
  font-size: 12px;
  color: var(--text-primary);
  flex-shrink: 0;
  min-width: 70px;
}
.suggest-item .suggest-latex {
  font-size: 14px;
  color: var(--text-secondary);
  overflow: hidden;
}
.suggest-item .suggest-latex .katex { font-size: 1em; }

/* Layer Top Row */
.layer-top {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}

/* Icon Buttons */
.icon-btn {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: none;
  border-radius: 6px;
  color: var(--text-tertiary);
  cursor: pointer; font-size: 14px;
  transition: all var(--transition-fast);
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--input-bg); color: var(--text-primary); }
.icon-btn.danger:hover { color: var(--danger); background: rgba(255,59,48,0.08); }
.icon-btn.active { color: var(--accent); }

/* Domain Restriction */
.advanced-toggle {
  display: flex; align-items: center; gap: 4px;
  margin-top: 6px; cursor: pointer;
  font-size: 11px; color: var(--text-tertiary);
  font-weight: 600; letter-spacing: 0.3px;
  user-select: none; transition: color var(--transition-fast);
}
.advanced-toggle:hover { color: var(--text-secondary); }
.advanced-toggle .arrow {
  display: inline-block;
  transition: transform var(--transition-fast);
  font-size: 9px;
}
.advanced-toggle.open .arrow { transform: rotate(90deg); }

.advanced-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
}
.advanced-body.open { max-height: 120px; }

/* Analysis Panel */
.analysis-toggle {
  display: flex; align-items: center; gap: 4px;
  margin-top: 6px; cursor: pointer;
  font-size: 11px; color: var(--accent);
  font-weight: 600; letter-spacing: 0.3px;
  user-select: none; transition: color var(--transition-fast);
}
.analysis-toggle:hover { opacity: 0.8; }
.analysis-toggle .arrow {
  display: inline-block;
  transition: transform var(--transition-fast);
  font-size: 9px;
}
.analysis-toggle.open .arrow { transform: rotate(90deg); }

.analysis-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
}
.analysis-body.open { max-height: 2000px; }

.analysis-grid {
  padding: 8px 0 2px;
  display: flex; flex-direction: column; gap: 6px;
}
.analysis-item {
  display: flex; gap: 8px; align-items: baseline;
}
.analysis-label {
  flex-shrink: 0;
  font-size: 11px; font-weight: 700;
  color: var(--text-tertiary);
  min-width: 72px;
}
.analysis-value {
  font-size: 12px;
  font-family: var(--mono-stack);
  color: var(--text-primary);
  line-height: 1.5;
  word-break: break-all;
}
.analysis-section-title {
  font-size: 10px; font-weight: 700;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-top: 6px; margin-bottom: 2px;
  padding-top: 6px;
  border-top: 1px solid var(--separator);
}

.domain-row {
  display: flex; align-items: center; gap: 6px; margin-top: 8px;
}
.domain-label {
  font-size: 10px; color: var(--text-tertiary);
  font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase; flex-shrink: 0;
}
.domain-input {
  flex: 1;
  background: var(--input-bg);
  border: 1.5px solid transparent;
  border-radius: 6px;
  padding: 4px 8px;
  font-family: var(--mono-stack);
  font-size: 11.5px;
  color: var(--text-primary);
  outline: none;
  transition: border-color var(--transition-fast);
}
.domain-input:focus { border-color: var(--accent); }

/* Parametric sub-rows */
.param-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.param-label {
  font-family: var(--mono-stack); font-size: 12px;
  color: var(--text-tertiary); width: 18px; text-align: right;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════
   ADD FUNCTION BUTTON
   ═══════════════════════════════════════════════════════════ */
#addFnBtn {
  width: calc(100% - 24px);
  margin: 4px 12px 12px;
  padding: 10px;
  background: transparent;
  border: 1.5px dashed var(--separator);
  border-radius: var(--radius-md);
  color: var(--text-tertiary);
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-family: var(--font-stack);
}
#addFnBtn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

/* ═══════════════════════════════════════════════════════════
   DYNAMIC VARIABLE SECTION
   ═══════════════════════════════════════════════════════════ */
.var-section {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--separator);
}

.var-section-title {
  font-size: 10px; font-weight: 700;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.var-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}

.var-label {
  font-family: var(--mono-stack);
  font-size: 16px; font-weight: 700;
  color: var(--accent);
  width: 18px; text-align: center;
}

.var-range-group {
  flex: 1; display: flex; flex-direction: column; gap: 2px;
}

.var-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px;
  background: var(--separator);
  border-radius: 2px; outline: none;
  transition: background var(--transition-fast);
}
.var-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}
.var-slider::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  box-shadow: 0 2px 8px rgba(0,122,255,0.35);
}
.var-slider::-moz-range-thumb {
  width: 16px; height: 16px;
  border-radius: 50%; background: var(--accent);
  cursor: pointer; border: none;
}

.var-value {
  font-family: var(--mono-stack);
  font-size: 12px; color: var(--text-secondary);
  min-width: 42px; text-align: right;
}

.var-controls { display: flex; gap: 6px; margin-top: 8px; }

.var-ctrl-btn {
  flex: 1; padding: 6px 8px;
  background: var(--input-bg);
  border: 1px solid transparent;
  border-radius: 7px;
  font-size: 11px; font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex; align-items: center; justify-content: center; gap: 4px;
  font-family: var(--font-stack);
}
.var-ctrl-btn:hover { background: var(--accent); color: #fff; }
.var-ctrl-btn.active { background: var(--accent); color: #fff; }

/* ═══════════════════════════════════════════════════════════
   TOOLBAR (TOP RIGHT)
   ═══════════════════════════════════════════════════════════ */
#toolbar {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 100;
  display: flex; gap: 8px;
  animation: slideIn 0.5s var(--transition-bounce) 0.1s both;
}

.toolbar-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  color: var(--text-secondary);
  cursor: pointer; border: none;
  background: var(--glass-bg);
  -webkit-backdrop-filter: saturate(180%) blur(var(--panel-blur));
  backdrop-filter: saturate(180%) blur(var(--panel-blur));
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  box-shadow: var(--glass-shadow);
  transition: all var(--transition-fast);
}
.toolbar-btn:hover {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
  transform: scale(1.06);
}
.toolbar-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
}

/* ═══════════════════════════════════════════════════════════
   GRID TOGGLE (BOTTOM CENTER)
   ═══════════════════════════════════════════════════════════ */
#axisToggle {
  position: fixed;
  bottom: 60px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  display: flex; gap: 2px; padding: 3px;
  animation: slideIn 0.5s var(--transition-bounce) 0.15s both;
}
#gridToggle {
  position: fixed;
  bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  display: flex; gap: 2px; padding: 3px;
  animation: slideIn 0.5s var(--transition-bounce) 0.2s both;
}

.grid-btn {
  padding: 6px 14px;
  background: transparent; border: none;
  border-radius: 7px;
  font-size: 11.5px; font-weight: 600;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-family: var(--font-stack);
}
.grid-btn.active { background: var(--accent); color: #fff; }
.grid-btn:hover:not(.active) { color: var(--text-primary); background: var(--input-bg); }

/* ═══════════════════════════════════════════════════════════
   ZOOM CONTROLS (BOTTOM RIGHT)
   ═══════════════════════════════════════════════════════════ */
#zoomControls {
  position: fixed;
  bottom: 16px; right: 16px;
  z-index: 100;
  display: flex; flex-direction: column; gap: 1px;
  overflow: hidden;
  animation: slideIn 0.5s var(--transition-bounce) 0.2s both;
}

.zoom-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 300;
  color: var(--text-secondary);
  cursor: pointer; border: none; background: transparent;
  transition: all var(--transition-fast);
}
.zoom-btn:hover { background: var(--input-bg); color: var(--text-primary); }
.zoom-btn:active { transform: scale(0.92); }

/* ═══════════════════════════════════════════════════════════
   COORD DISPLAY (BOTTOM LEFT)
   ═══════════════════════════════════════════════════════════ */
#coordDisplay {
  position: fixed;
  bottom: 16px; left: 16px;
  z-index: 100;
  padding: 7px 12px;
  font-family: var(--mono-stack);
  font-size: 11.5px;
  color: var(--text-secondary);
  animation: slideIn 0.5s var(--transition-bounce) 0.2s both;
}

/* ═══════════════════════════════════════════════════════════
   TOOLTIP
   ═══════════════════════════════════════════════════════════ */
#tooltip {
  position: fixed; z-index: 200;
  background: var(--tooltip-bg);
  color: var(--tooltip-text);
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px; line-height: 1.6;
  pointer-events: none;

<script>
/* ═══════════════════════════════════════════════════════════
   CORE APPLICATION STATE
   ═══════════════════════════════════════════════════════════ */
const canvas = document.getElementById('plotCanvas');
const ctx = canvas.getContext('2d');

const PALETTE = [
  '#007aff', // Blue
  '#af52de', // Purple
  '#ff6259', // Coral
  '#30d158', // Green
  '#ff9f0a', // Orange
  '#5e5ce6', // Indigo
  '#ff375f', // Pink
  '#64d2ff', // Teal
];

const state = {
  // Viewport: math coords at center, scale = pixels per math unit
  cx: 0, cy: 0, scale: 50,

  // Interaction
  isPanning: false,
  panStart: null,
  panOrigin: null,
  mouse: { x: -9999, y: -9999 },

  // Grid
  gridType: 'cartesian',
  axisMode: 'scalar', // 'scalar' | 'radian'

  // Snap
  snapEnabled: true,
  snapResult: null,

  // Dynamic variables
  variables: [{ name: 'a', value: 1, min: -10, max: 10, playing: false, dir: 1 }],

  // Layers
  layers: [],
  nextId: 0,

  // Cache
  compiledCache: new Map(),

  // Render
  needsRender: true,

  // Retina
  dpr: Math.max(1, window.devicePixelRatio || 1),
};

/* ═══════════════════════════════════════════════════════════
   MATH.JS — EXPRESSION COMPILATION & EVALUATION
   ═══════════════════════════════════════════════════════════ */
const evalScope = {};

function syncScope() {
  // Rebuild evalScope from state.variables
  for (const key of Object.keys(evalScope)) delete evalScope[key];
  for (const v of state.variables) evalScope[v.name] = v.value;
}

function compileExpr(expr) {
  if (!expr || !expr.trim()) return null;
  const key = expr.trim();
  if (state.compiledCache.has(key)) return state.compiledCache.get(key);
  try {
    // Normalize: ln → log (math.js uses log for natural log)
    const normalized = key.replace(/\bln\(/g, 'log(');
    const node = math.parse(normalized);
    const compiled = node.compile();
    state.compiledCache.set(key, compiled);
    return compiled;
  } catch (e) {
    return null;
  }
}

function evalNum(compiled, vars) {
  try {
    const v = compiled.evaluate({ ...evalScope, ...vars });
    if (typeof v !== 'number') return NaN;
    if (!isFinite(v)) return NaN;
    return v;
  } catch { return NaN; }
}

function invalidateCache() {
  state.compiledCache.clear();
}

/* ═══════════════════════════════════════════════════════════
   COORDINATE TRANSFORMS
   ═══════════════════════════════════════════════════════════ */
function m2s(mx, my) {
  // Math → Screen
  const w = canvas.width / state.dpr;
  const h = canvas.height / state.dpr;
  return [
    (mx - state.cx) * state.scale + w * 0.5,
    -(my - state.cy) * state.scale + h * 0.5,
  ];
}

function s2m(sx, sy) {
  // Screen → Math
  const w = canvas.width / state.dpr;
  const h = canvas.height / state.dpr;
  return [
    (sx - w * 0.5) / state.scale + state.cx,
    -(sy - h * 0.5) / state.scale + state.cy,
  ];
}

/* ═══════════════════════════════════════════════════════════
   LAYER MANAGEMENT
   ═══════════════════════════════════════════════════════════ */
function createLayer(opts = {}) {
  return {
    id: state.nextId++,
    type: opts.type || 'explicit',
    expr: opts.expr || '',
    paramX: opts.paramX || '',
    paramY: opts.paramY || '',
    polarR: opts.polarR || '',
    color: opts.color || PALETTE[state.layers.length % PALETTE.length],
    visible: true,
    domainMin: '',
    domainMax: '',
    advOpen: false,
    analysisOpen: false,
    error: false,
  };
}

function addLayer(expr, type) {
  const layer = createLayer({ expr, type });
  state.layers.push(layer);
  renderLayerList();
  scheduleRender();
  return layer;
}

function removeLayer(id) {
  const card = document.querySelector(`.layer-card[data-id="${id}"]`);
  if (card) {
    card.classList.add('removing');
    card.addEventListener('animationend', () => {
      state.layers = state.layers.filter(l => l.id !== id);
      renderLayerList();
      scheduleRender();
    }, { once: true });
  } else {
    state.layers = state.layers.filter(l => l.id !== id);
    renderLayerList();
    scheduleRender();
  }
}

function updateLayer(id, patch) {
  const layer = state.layers.find(l => l.id === id);
  if (!layer) return;
  Object.assign(layer, patch);
  if ('expr' in patch || 'paramX' in patch || 'paramY' in patch || 'polarR' in patch) {
    invalidateCache();
    layer.error = false;
  }
  scheduleRender();
}

/* ─── RENDER LAYER LIST DOM ─── */
function renderLayerList() {
  const box = document.getElementById('layerList');
  box.innerHTML = '';

  state.layers.forEach(layer => {
    const card = document.createElement('div');
    card.className = 'layer-card';
    card.dataset.id = layer.id;

    // Build equation inputs based on type
    let eqHTML = '';
    if (layer.type === 'explicit') {
      eqHTML = `
        <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">
          <span style="font-family:var(--mono-stack);font-size:12px;color:var(--text-tertiary);flex-shrink:0;">y =</span>
          <input class="eq-input${layer.error ? ' error' : ''}" value="${esc(layer.expr)}"
            data-id="${layer.id}" data-field="expr" placeholder="如 sin(x)·e^(-x/5)">
        </div>`;
    } else if (layer.type === 'parametric') {
      eqHTML = `
        <div style="flex:1;min-width:0;">
          <div class="param-row">
            <span class="param-label">x =</span>
            <input class="eq-input" value="${esc(layer.paramX)}" data-id="${layer.id}" data-field="paramX" placeholder="cos(t)">
          </div>
          <div class="param-row">
            <span class="param-label">y =</span>
            <input class="eq-input" value="${esc(layer.paramY)}" data-id="${layer.id}" data-field="paramY" placeholder="sin(t)">
          </div>
        </div>`;
    } else {
      eqHTML = `
        <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">
          <span style="font-family:var(--mono-stack);font-size:12px;color:var(--text-tertiary);flex-shrink:0;">r =</span>
          <input class="eq-input${layer.error ? ' error' : ''}" value="${esc(layer.polarR)}"
            data-id="${layer.id}" data-field="polarR" placeholder="1 + cos(theta)">
        </div>`;
    }

    card.innerHTML = `
      <div class="type-row">
        <button class="type-btn${layer.type === 'explicit' ? ' active' : ''}" data-id="${layer.id}" data-type="explicit">显式函数</button>
        <button class="type-btn${layer.type === 'parametric' ? ' active' : ''}" data-id="${layer.id}" data-type="parametric">参数方程</button>
        <button class="type-btn${layer.type === 'polar' ? ' active' : ''}" data-id="${layer.id}" data-type="polar">极坐标</button>
      </div>
      <div class="layer-top">
        <div class="color-dot" style="background:${layer.color}">
          <input type="color" value="${layer.color}" data-id="${layer.id}" data-field="color">
        </div>
        ${eqHTML}
        <button class="icon-btn vis-btn${layer.visible ? '' : ' active'}" data-id="${layer.id}" title="切换可见性">
          ${layer.visible
            ? '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1.5 8s2.5-4.5 6.5-4.5S14.5 8 14.5 8s-2.5 4.5-6.5 4.5S1.5 8 1.5 8z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/></svg>'
            : '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M1.5 8s2.5-4.5 6.5-4.5c1.1 0 2.1.3 3 .8M14.5 8s-.7 1.2-2 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>'}
        </button>
        <button class="icon-btn danger del-btn" data-id="${layer.id}" title="删除">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="advanced-toggle${layer.advOpen ? ' open' : ''}" data-id="${layer.id}">
        <span class="arrow">▸</span> 定义域限制
      </div>
      <div class="advanced-body${layer.advOpen ? ' open' : ''}">
        <div class="domain-row">
          <span class="domain-label">最小</span>
          <input class="domain-input" value="${esc(layer.domainMin)}" data-id="${layer.id}" data-field="domainMin" placeholder="-∞">
          <span class="domain-label">最大</span>
          <input class="domain-input" value="${esc(layer.domainMax)}" data-id="${layer.id}" data-field="domainMax" placeholder="+∞">
        </div>
      </div>
      <div class="analysis-toggle${layer.analysisOpen ? ' open' : ''}" data-id="${layer.id}" data-action="analysis">
        <span class="arrow">▸</span> 函数分析
      </div>
      <div class="analysis-body${layer.analysisOpen ? ' open' : ''}" data-analysis="${layer.id}">
        ${layer.analysisOpen ? renderAnalysisContent(layer) : ''}
      </div>`;

    box.appendChild(card);
  });

  // Attach events via delegation
  attachLayerEvents();
}

function attachLayerEvents() {
  const box = document.getElementById('layerList');

  // Input changes
  box.querySelectorAll('input[data-id]').forEach(input => {
    const handler = () => {
      const id = +input.dataset.id;
      const field = input.dataset.field;
      if (field === 'color') {
        updateLayer(id, { color: input.value });
        input.parentElement.style.background = input.value;
      } else {
        updateLayer(id, { [field]: input.value });
      }
    };
    input.addEventListener('input', handler);
    if (input.type === 'color') input.addEventListener('change', handler);
  });

  // Type buttons
  box.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      updateLayer(+btn.dataset.id, { type: btn.dataset.type });
      renderLayerList();
    });
  });

  // Visibility toggle
  box.querySelectorAll('.vis-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const layer = state.layers.find(l => l.id === +btn.dataset.id);
      if (layer) {
        layer.visible = !layer.visible;
        renderLayerList();
        scheduleRender();
      }
    });
  });

  // Delete
  box.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => removeLayer(+btn.dataset.id));
  });

  // Advanced toggle
  box.querySelectorAll('.advanced-toggle').forEach(tog => {
    tog.addEventListener('click', () => {
      const layer = state.layers.find(l => l.id === +tog.dataset.id);
      if (layer) {
        layer.advOpen = !layer.advOpen;
        tog.classList.toggle('open');
        tog.nextElementSibling.classList.toggle('open');
      }
    });
  });

  // Suggestion dropdown
  box.querySelectorAll('.eq-input.no-suggest').forEach(input => {
    // skip inputs marked with no-suggest class
  });
  box.querySelectorAll('.eq-input:not(.no-suggest)').forEach(input => {
    input.addEventListener('keydown', (e) => handleSuggestKeynav(e, input));
    input.addEventListener('blur', () => setTimeout(() => hideSuggestions(), 150));
    input.addEventListener('focus', () => showSuggestions(input));
  });

  // Analysis toggle
  box.querySelectorAll('.analysis-toggle').forEach(tog => {
    tog.addEventListener('click', () => {
      const layer = state.layers.find(l => l.id === +tog.dataset.id);
      if (!layer) return;
      layer.analysisOpen = !layer.analysisOpen;
      tog.classList.toggle('open');
      const body = tog.nextElementSibling;
      if (layer.analysisOpen) {
        try {
          body.innerHTML = renderAnalysisContent(layer);
        } catch (e) {
          body.innerHTML = '<div style="padding:8px 0;font-size:12px;color:var(--danger);">分析出错，请检查函数表达式</div>';
        }
        body.classList.add('open');
      } else {
        body.classList.remove('open');
      }
    });
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════════
   SUGGESTION DROPDOWN
   ═══════════════════════════════════════════════════════════ */
const SUGGESTIONS = [
  // 三角函数
  { fn: 'sin()', latex: '\\sin(x)' },
  { fn: 'cos()', latex: '\\cos(x)' },
  { fn: 'tan()', latex: '\\tan(x)' },
  { fn: 'sec()', latex: '\\sec(x)' },
  { fn: 'csc()', latex: '\\csc(x)' },
  { fn: 'cot()', latex: '\\cot(x)' },
  // 反三角
  { fn: 'arcsin()', latex: '\\arcsin(x)' },
  { fn: 'arccos()', latex: '\\arccos(x)' },
  { fn: 'arctan()', latex: '\\arctan(x)' },
  // 双曲
  { fn: 'sinh()', latex: '\\sinh(x)' },
  { fn: 'cosh()', latex: '\\cosh(x)' },
  { fn: 'tanh()', latex: '\\tanh(x)' },
  // 对数
  { fn: 'log()', latex: '\\log(x)' },
  { fn: 'log(,)', latex: '\\log_a(x)' },
  { fn: 'ln()', latex: '\\ln(x)' },
  { fn: 'log10()', latex: '\\log_{10}(x)' },
  { fn: 'log2()', latex: '\\log_2(x)' },
  // 指数
  { fn: 'exp()', latex: 'e^x' },
  { fn: 'a^x', latex: 'a^x' },
  { fn: 'e^x', latex: 'e^x' },
  { fn: '2^x', latex: '2^x' },
  { fn: '10^x', latex: '10^x' },
  // 根号
  { fn: 'sqrt()', latex: '\\sqrt{x}' },
  { fn: 'cbrt()', latex: '\\sqrt[3]{x}' },
  { fn: 'nthRoot(,)', latex: '\\sqrt[n]{x}' },
  { fn: 'sqrt(x^2+1)', latex: '\\sqrt{x^2+1}' },
  // 幂
  { fn: 'x^2', latex: 'x^2' },
  { fn: 'x^3', latex: 'x^3' },
  { fn: 'x^n', latex: 'x^n' },
  { fn: '1/x', latex: '\\frac{1}{x}' },
  { fn: '(x+a)^2', latex: '(x+a)^2' },
  { fn: '(x-a)^2', latex: '(x-a)^2' },
  // 绝对值/取整
  { fn: 'abs()', latex: '|x|' },
  { fn: 'sign()', latex: '\\operatorname{sgn}(x)' },
  { fn: 'floor()', latex: '\\lfloor x\\rfloor' },
  { fn: 'ceil()', latex: '\\lceil x\\rceil' },
  { fn: 'round()', latex: '\\operatorname{round}(x)' },
  // 组合/数论
  { fn: 'gcd(,)', latex: '\\gcd(a,b)' },
  { fn: 'lcm(,)', latex: '\\operatorname{lcm}(a,b)' },
  { fn: 'mod(,)', latex: 'a \\bmod b' },
  { fn: 'combinations(,)', latex: '\\binom{n}{k}' },
  { fn: 'permutations(,)', latex: 'P(n,k)' },
  // 阶乘/Gamma
  { fn: 'factorial()', latex: 'n!' },
  { fn: 'gamma()', latex: '\\Gamma(x)' },
  // 多项式
  { fn: 'x^2+x+1', latex: 'x^2+x+1' },
  { fn: 'x^3-x', latex: 'x^3-x' },
  { fn: 'x^3-3x', latex: 'x^3-3x' },
  { fn: '1/x^2', latex: '\\frac{1}{x^2}' },
  { fn: '1/(x+1)', latex: '\\frac{1}{x+1}' },
  { fn: 'x/(x^2+1)', latex: '\\frac{x}{x^2+1}' },
  // 常用组合
  { fn: 'a*sin(b*x+c)+d', latex: 'a\\sin(bx+c)+d' },
  { fn: 'sin(x)+cos(x)', latex: '\\sin(x)+\\cos(x)' },
  { fn: 'sin(x)^2', latex: '\\sin^2(x)' },
  { fn: 'cos(x)^2', latex: '\\cos^2(x)' },
  { fn: 'tan(x)^2', latex: '\\tan^2(x)' },
  { fn: 'sin(a*x)*cos(b*x)', latex: '\\sin(ax)\\cos(bx)' },
  // 分段/其他
  { fn: 'e^(-x^2)', latex: 'e^{-x^2}' },
  { fn: 'sin(1/x)', latex: '\\sin\\left(\\frac{1}{x}\\right)' },
